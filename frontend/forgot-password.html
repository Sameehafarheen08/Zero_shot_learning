<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="form-container">
    <h2>Forgot Password</h2>
    <form>
      <input type="email" placeholder="Enter your registered email" required />
      <button type="submit" style="display: block; width: 100%; padding: 12px; font-size: 1.1em; background-color: #399176; color: white; border: none; border-radius: 5px; margin-top: 15px; cursor: pointer;">Reset Password</button>
    </form>
  </div>
</body>
</html>
