<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports</title>
  <link rel="stylesheet" href="admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">Admin Panel</div>
    <ul class="nav-links">
      <li><a href="admin.html">Home</a></li>
      <li><a href="users.html">Manage Users</a></li>
      <li><a href="history.html">Classification History</a></li>
      <li><a href="reports.html" class="active">Reports</a></li>
      <li><a href="settings.html">Settings</a></li>
      <li><a href="feedback.html">Feedback</a></li>
      <li><a href="login.html">Logout</a></li>
    </ul>
  </nav>
    <style>
     body {
    background-image: url("sampleimage/prediction.jpeg"); /* 🔁 Change image name for each page */
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    min-height: 100vh;
    margin: 0;
    padding: 0;
    position: relative;
    font-family: Arial, sans-serif;
  }

  body::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: rgba(255, 255, 255, 0.3); /* 💡 Light transparent overlay */
    z-index: -1;
  }

  .content-box {
    background-color: rgba(255, 255, 255, 0.85);
    padding: 30px;
    border-radius: 12px;
    margin: 60px auto;
    max-width: 900px;
    box-shadow: 0 0 15px rgba(0, 0, 0, 0.15);
  }
  </style>


  <!-- REPORTS SECTION -->
  <section class="dashboard">
    <h1>Reports & Analytics</h1>

    <!-- Cards for Key Metrics -->
    <div class="cards">
      <div class="card">
        <h2>Total Users</h2>
        <p>130</p>
      </div>
      <div class="card">
        <h2>Total Images Classified</h2>
        <p>4,150</p>
      </div>
      <div class="card">
        <h2>Active Today</h2>
        <p>27</p>
      </div>
    </div>

    <!-- Charts -->
    <div class="chart-container">
      <h2>Weekly Uploads</h2>
      <canvas id="uploadsChart"></canvas>
    </div>

    <div class="chart-container">
      <h2>User Growth</h2>
      <canvas id="usersChart"></canvas>
    </div>
  </section>

  <script>
    // Weekly Uploads Bar Chart
    const ctx1 = document.getElementById('uploadsChart').getContext('2d');
    new Chart(ctx1, {
      type: 'bar',
      data: {
        labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
        datasets: [{
          label: 'Images Uploaded',
          data: [12, 19, 8, 17, 23, 30, 15],
          backgroundColor: '#00bcd4'
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } }
      }
    });

    // User Growth Line Chart
    const ctx2 = document.getElementById('usersChart').getContext('2d');
    new Chart(ctx2, {
      type: 'line',
      data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul'],
        datasets: [{
          label: 'Total Users',
          data: [20, 50, 90, 130, 180, 220, 260],
          borderColor: '#4caf50',
          fill: false,
          tension: 0.3
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } }
      }
    });
  </script>
</body>
</html>
