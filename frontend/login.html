<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - ZeroShot Classifier</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding-top: 0 !important;
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
    }
    
    .form-container {
      margin-top: 0 !important;
      max-width: 420px;
      width: 90%;
      animation: slideIn 0.5s ease-out;
      box-shadow: var(--shadow-xl);
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .form-container h2 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 32px;
      background: var(--gradient-1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .form-container > p:first-of-type {
      text-align: center;
      margin-bottom: 30px;
      color: var(--text-secondary);
      font-size: 14px;
    }
    
    .link-right {
      float: right;
      font-size: 13px;
      margin-bottom: 15px;
      color: var(--primary-color);
      text-decoration: none;
      transition: all 0.3s ease;
      font-weight: 600;
    }
    
    .link-right:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }
    
    .form-container p:last-child {
      text-align: center;
      margin-top: 25px;
      color: var(--text-secondary);
    }
    
    .form-container a:not(.link-right) {
      color: var(--primary-color);
      font-weight: 700;
      transition: all 0.3s ease;
      text-decoration: none;
    }
    
    .form-container a:not(.link-right):hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>🔐 Welcome Back</h2>
    <p>Sign in to your account to continue</p>
    
    <p id="loginStatus"></p>
    
    <form id="loginForm">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="your@email.com" required />
      
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" required />
      
      <a href="forgot-password.html" class="link-right">Forgot Password?</a>
      
      <button type="submit">🚀 Sign In</button>
    </form>
    
    <p>
      Don't have an account? <a href="signup.html">Create one here</a>
    </p>
  </div>

  <script>
    // Check if already logged in
    if (sessionStorage.getItem("user_id")) {
      window.location.href = "index.html";
    }

    const statusElement = document.getElementById("loginStatus");
    const submitBtn = document.querySelector("button[type='submit']");
    const originalBtnText = submitBtn.textContent;

    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        statusElement.style.color = "red";
        statusElement.innerText = "❌ Please enter email and password";
        return;
      }

      // Validate email format
      if (!email.includes("@")) {
        statusElement.style.color = "red";
        statusElement.innerText = "❌ Invalid email format";
        return;
      }

      // Disable button
      submitBtn.disabled = true;
      submitBtn.textContent = "🔐 Logging in...";
      statusElement.style.color = "blue";
      statusElement.innerText = "⏳ Authenticating...";

      try {
        const response = await fetch("http://localhost:5000/api/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            email: email,
            password: password
          })
        });

        const data = await response.json();

        if (data.success) {
          // Save user data to session storage
          sessionStorage.setItem("user_id", data.user_id);
          sessionStorage.setItem("email", data.email);
          sessionStorage.setItem("token", data.token);
          
          // Check if user is admin
          const isAdmin = data.is_admin || false;
          sessionStorage.setItem("is_admin", isAdmin);

          statusElement.style.color = "green";
          statusElement.innerText = "✅ Login successful! Redirecting...";

          // Redirect to admin panel or home based on role
          setTimeout(() => {
            if (isAdmin) {
              window.location.href = "admin_panel.html";
            } else {
              window.location.href = "index.html";
            }
          }, 1500);
        } else {
          statusElement.style.color = "red";
          statusElement.innerText = `❌ ${data.message}`;
        }
      } catch (error) {
        console.error("Login error:", error);
        statusElement.style.color = "red";
        statusElement.innerText = "❌ Network error. Please check if backend is running.";
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = originalBtnText;
      }
    });
  </script>
